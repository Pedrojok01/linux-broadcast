name: Publish to AUR (manual)

# Manual safety valve. The normal AUR push happens as the `aur` job in
# release.yml so it runs in the same workflow as the .deb build (events
# fired by GITHUB_TOKEN don't trigger downstream workflows, which would
# leave a `release: published` trigger here silently dead).
#
# Use this when you need to re-publish to AUR without re-tagging:
#   gh workflow run aur.yml -f tag=v0.1.2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.2). Required."
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Push linux-broadcast-bin to AUR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          tag="${DISPATCH_TAG}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for .deb asset to be reachable
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          url="https://github.com/Pedrojok01/linux-broadcast/releases/download/v${VERSION}/linux-broadcast_${VERSION}-1_amd64.deb"
          for attempt in $(seq 1 20); do
            if curl -sfLI "$url" -o /dev/null; then
              echo "Asset available: $url"
              exit 0
            fi
            echo "Attempt $attempt: $url not ready yet, sleeping 15s..."
            sleep 15
          done
          echo "Timed out waiting for $url" >&2
          exit 1

      - name: Pin pkgver and sha256 in PKGBUILD
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          url="https://github.com/Pedrojok01/linux-broadcast/releases/download/v${VERSION}/linux-broadcast_${VERSION}-1_amd64.deb"
          curl -sSfL "$url" -o /tmp/lb.deb
          sum="$(sha256sum /tmp/lb.deb | awk '{print $1}')"

          sed -i -E "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD
          sed -i -E "s|^sha256sums=.*|sha256sums=('${sum}')|" packaging/aur/PKGBUILD

          echo "----- PKGBUILD after substitutions -----"
          cat packaging/aur/PKGBUILD

      - name: Regenerate .SRCINFO
        run: |
          docker run --rm -v "$PWD/packaging/aur:/aur" archlinux:base-devel bash -c '
            useradd -m builder
            cp -r /aur/. /tmp/aur
            chown -R builder /tmp/aur
            su builder -c "cd /tmp/aur && makepkg --printsrcinfo" > /aur/.SRCINFO
          '
          echo "----- .SRCINFO after regeneration -----"
          cat packaging/aur/.SRCINFO

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -4 -t rsa,ed25519,ecdsa aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
              User aur
              IdentityFile ~/.ssh/aur_key
              IdentitiesOnly yes
              AddressFamily inet
          EOF
          chmod 600 ~/.ssh/config

          git clone ssh://aur@aur.archlinux.org/linux-broadcast-bin.git /tmp/aur-repo
          cp packaging/aur/PKGBUILD          /tmp/aur-repo/PKGBUILD
          cp packaging/aur/.SRCINFO          /tmp/aur-repo/.SRCINFO
          cp packaging/aur/linux-broadcast.install /tmp/aur-repo/linux-broadcast.install

          cd /tmp/aur-repo
          git config user.name "Pedrojok01"
          git config user.email "pedrojok@pm.me"
          git add PKGBUILD .SRCINFO linux-broadcast.install

          if git diff --cached --quiet; then
            echo "No AUR-side changes — already at $VERSION-1."
            exit 0
          fi
          git commit -m "linux-broadcast-bin ${VERSION}-1"
          git push origin master
