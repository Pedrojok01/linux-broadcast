name: AUR PKGBUILD lint

on:
  push:
    branches: [main]
    paths:
      - "packaging/aur/**"
      - ".github/workflows/aur-lint.yml"
  pull_request:
    paths:
      - "packaging/aur/**"
      - ".github/workflows/aur-lint.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Validate PKGBUILD parses and .SRCINFO is in sync
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Validate PKGBUILD + .SRCINFO
        run: |
          set -euo pipefail
          useradd -m builder
          cp -r packaging/aur /tmp/aur
          chown -R builder /tmp/aur

          # makepkg refuses to run as root.
          su builder -c "cd /tmp/aur && makepkg --printsrcinfo" > /tmp/canonical_srcinfo

          echo "----- canonical .SRCINFO from PKGBUILD -----"
          cat /tmp/canonical_srcinfo
          echo "--------------------------------------------"

          if ! diff -u packaging/aur/.SRCINFO /tmp/canonical_srcinfo; then
            echo
            echo "::error::packaging/aur/.SRCINFO is out of sync with PKGBUILD."
            echo "Regenerate locally with:"
            echo "  docker run --rm -v \"\$PWD/packaging/aur:/aur\" archlinux:base-devel bash -c 'useradd -m b && cp -r /aur/. /tmp/aur && chown -R b /tmp/aur && su b -c \"cd /tmp/aur && makepkg --printsrcinfo\"' > packaging/aur/.SRCINFO"
            exit 1
          fi

      - name: Run namcap on PKGBUILD
        run: |
          pacman -Sy --noconfirm namcap >/dev/null
          # namcap reports informational notices on -bin packages (no
          # build()/check() hooks) — treat as advisory, fail only on
          # E: errors.
          if namcap packaging/aur/PKGBUILD | tee /tmp/namcap.log | grep -E '^[A-Za-z0-9_/.-]+ E:'; then
            echo "::error::namcap reported errors above."
            exit 1
          fi
          echo "namcap output (advisory):"
          cat /tmp/namcap.log
