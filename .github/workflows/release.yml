name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  deb:
    name: Build and publish .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo version
        run: |
          manifest_version="$(
            awk '
              $0 == "[workspace.package]" { in_section = 1; next }
              /^\[/ && in_section { exit }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ -z "$manifest_version" ]; then
            echo "Could not read [workspace.package].version from Cargo.toml"
            exit 1
          fi

          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Tag version ($tag_version) does not match Cargo.toml version ($manifest_version)"
            exit 1
          fi

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-libav \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build Debian package
        run: cargo deb -p linux-broadcast

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
          generate_release_notes: true
