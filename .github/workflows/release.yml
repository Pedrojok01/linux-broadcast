name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  deb:
    name: Build and publish .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo version
        run: |
          manifest_version="$(
            awk '
              $0 == "[workspace.package]" { in_section = 1; next }
              /^\[/ && in_section { exit }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ -z "$manifest_version" ]; then
            echo "Could not read [workspace.package].version from Cargo.toml"
            exit 1
          fi

          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Tag version ($tag_version) does not match Cargo.toml version ($manifest_version)"
            exit 1
          fi

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-libav \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build Debian package
        run: cargo deb -p linux-broadcast

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
          generate_release_notes: true

  aur:
    name: Publish linux-broadcast-bin to AUR
    needs: deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for .deb asset to be reachable
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          url="https://github.com/Pedrojok01/linux-broadcast/releases/download/v${VERSION}/linux-broadcast_${VERSION}-1_amd64.deb"
          for attempt in $(seq 1 20); do
            if curl -sfLI "$url" -o /dev/null; then
              echo "Asset available: $url"
              exit 0
            fi
            echo "Attempt $attempt: $url not ready yet, sleeping 15s..."
            sleep 15
          done
          echo "Timed out waiting for $url" >&2
          exit 1

      - name: Pin pkgver and sha256 in PKGBUILD
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          url="https://github.com/Pedrojok01/linux-broadcast/releases/download/v${VERSION}/linux-broadcast_${VERSION}-1_amd64.deb"
          curl -sSfL "$url" -o /tmp/lb.deb
          sum="$(sha256sum /tmp/lb.deb | awk '{print $1}')"

          sed -i -E "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD
          sed -i -E "s|^sha256sums=.*|sha256sums=('${sum}')|" packaging/aur/PKGBUILD

      - name: Regenerate .SRCINFO
        run: |
          docker run --rm -v "$PWD/packaging/aur:/aur" archlinux:base-devel bash -c '
            useradd -m builder
            cp -r /aur/. /tmp/aur
            chown -R builder /tmp/aur
            su builder -c "cd /tmp/aur && makepkg --printsrcinfo" > /aur/.SRCINFO
          '

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          # SSH setup. ssh-keyscan against IPv4 because most public runners
          # have working IPv6 but AUR sometimes serves stale AAAA records.
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -4 -t rsa,ed25519,ecdsa aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
              User aur
              IdentityFile ~/.ssh/aur_key
              IdentitiesOnly yes
              AddressFamily inet
          EOF
          chmod 600 ~/.ssh/config

          # Clone existing AUR repo, copy in the rewritten files.
          git clone ssh://aur@aur.archlinux.org/linux-broadcast-bin.git /tmp/aur-repo
          cp packaging/aur/PKGBUILD          /tmp/aur-repo/PKGBUILD
          cp packaging/aur/.SRCINFO          /tmp/aur-repo/.SRCINFO
          cp packaging/aur/linux-broadcast.install /tmp/aur-repo/linux-broadcast.install

          cd /tmp/aur-repo
          git config user.name "Pedrojok01"
          git config user.email "pedrojok@pm.me"
          git add PKGBUILD .SRCINFO linux-broadcast.install

          if git diff --cached --quiet; then
            echo "No AUR-side changes — already at $VERSION-1."
            exit 0
          fi
          git commit -m "linux-broadcast-bin ${VERSION}-1"
          git push origin master
