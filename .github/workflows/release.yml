name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  deb:
    name: Build and publish .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo version
        run: |
          manifest_version="$(
            awk '
              $0 == "[workspace.package]" { in_section = 1; next }
              /^\[/ && in_section { exit }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ -z "$manifest_version" ]; then
            echo "Could not read [workspace.package].version from Cargo.toml"
            exit 1
          fi

          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Tag version ($tag_version) does not match Cargo.toml version ($manifest_version)"
            exit 1
          fi

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-libav \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build Debian package
        run: cargo deb -p linux-broadcast

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
          generate_release_notes: true

  aur:
    name: Publish linux-broadcast-bin to AUR
    needs: deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for .deb asset to be reachable
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          url="https://github.com/Pedrojok01/linux-broadcast/releases/download/v${VERSION}/linux-broadcast_${VERSION}-1_amd64.deb"
          for attempt in $(seq 1 20); do
            if curl -sfLI "$url" -o /dev/null; then
              echo "Asset available: $url"
              exit 0
            fi
            echo "Attempt $attempt: $url not ready yet, sleeping 15s..."
            sleep 15
          done
          echo "Timed out waiting for $url" >&2
          exit 1

      - name: Pin pkgver and sha256 in PKGBUILD
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          url="https://github.com/Pedrojok01/linux-broadcast/releases/download/v${VERSION}/linux-broadcast_${VERSION}-1_amd64.deb"
          curl -sSfL "$url" -o /tmp/lb.deb
          sum="$(sha256sum /tmp/lb.deb | awk '{print $1}')"

          sed -i -E "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD
          sed -i -E "s|^sha256sums=.*|sha256sums=('${sum}')|" packaging/aur/PKGBUILD

      - name: Regenerate .SRCINFO
        run: |
          docker run --rm -v "$PWD/packaging/aur:/aur" archlinux:base-devel bash -c '
            useradd -m builder
            cp -r /aur/. /tmp/aur
            chown -R builder /tmp/aur
            su builder -c "cd /tmp/aur && makepkg --printsrcinfo" > /aur/.SRCINFO
          '

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: linux-broadcast-bin
          pkgbuild: packaging/aur/PKGBUILD
          assets: |
            packaging/aur/linux-broadcast.install
          commit_username: Pedrojok01
          commit_email: pedrojok@pm.me
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "linux-broadcast-bin ${{ steps.ver.outputs.version }}-1"
          ssh_keyscan_types: rsa,ed25519,ecdsa
