# Linux Broadcast — v4l2loopback options.
# Installed by the linux-broadcast .deb to /etc/modprobe.d/linux-broadcast.conf.
# Marked as a dpkg conffile, so manual edits are preserved across upgrades.
options v4l2loopback devices=1 video_nr=10 card_label="LinuxBroadcast" exclusive_caps=1 max_buffers=2
