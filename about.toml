# SPDX identifiers we permit in shipped third-party code. All are
# permissive or weak/file-level copyleft, compatible with the
# GPL-3.0-or-later binary. GPL-3.0-or-later itself is listed so the
# workspace's own crates (lb_pipeline, linux-broadcast) don't trip
# the check.
accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "GPL-3.0-or-later",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OFL-1.1",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "LicenseRef-UFL-1.0",
]

# epaint_default_fonts uses a `LicenseRef-UFL-1.0` expression for the
# Ubuntu Font License, which isn't a valid SPDX identifier.
# Clarification tells cargo-about how to satisfy that part of the
# expression — we point at the UFL license text vendored in the
# crate's own repository.
[epaint_default_fonts.clarify]
license = "(MIT OR Apache-2.0) AND OFL-1.1 AND LicenseRef-UFL-1.0"

[[epaint_default_fonts.clarify.files]]
path = "fonts/UFL.txt"
checksum = "2f0015108d68627bd788d313f529c21ff4da2c2c42a5e1f3883acc83480f9002"
license = "LicenseRef-UFL-1.0"

[[epaint_default_fonts.clarify.files]]
path = "fonts/OFL.txt"
checksum = "6a73f9541c2de74158c0e7cf6b0a58ef774f5a780bf191f2d7ec9cc53efe2bf2"
license = "OFL-1.1"
