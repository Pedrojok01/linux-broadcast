repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --all -- --check
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        require_serial: true
        files: '^(Cargo\.toml|Cargo\.lock|rust-toolchain\.toml|rustfmt\.toml|crates/.*\.rs)$'
      - id: cargo-clippy
        name: cargo clippy --workspace --all-targets --release -- -D warnings
        entry: cargo clippy --workspace --all-targets --release -- -D warnings
        language: system
        pass_filenames: false
        require_serial: true
        files: '^(Cargo\.toml|Cargo\.lock|rust-toolchain\.toml|rustfmt\.toml|crates/)'
